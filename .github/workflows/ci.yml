name: CI

on:
  push:
    branches: [main, genspark_ai_developer]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: core — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ktalk-core/go.sum
      - name: go fmt
        run: cd ktalk-core && gofmt -l . | tee /dev/stderr | (! grep .)
      - name: go vet
        run: cd ktalk-core && go vet ./...
      - name: go test
        run: cd ktalk-core && go test -race -count=1 -timeout=120s -short ./...

  test-panel:
    name: panel — frontend build + go lint + go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ktalk-panel/web/pnpm-lock.yaml
      - name: Frontend install + build
        run: cd ktalk-panel/web && pnpm install --frozen-lockfile && pnpm build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ktalk-panel/go.sum
      - name: go fmt
        run: cd ktalk-panel && gofmt -l . | tee /dev/stderr | (! grep .)
      - name: go vet
        run: cd ktalk-panel && go vet ./...
      - name: go test
        run: cd ktalk-panel && go test -short ./...
      - name: go build (smoke)
        run: cd ktalk-panel && go build ./cmd/ktalk-panel
