name: CI

on:
  push:
    branches: [main, genspark_ai_developer]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: ktalk-core — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ktalk-core/go.sum
      - name: go fmt
        run: cd ktalk-core && gofmt -l . | tee /dev/stderr | (! grep .)
      - name: go vet
        run: cd ktalk-core && go vet ./...
      - name: go test
        run: cd ktalk-core && go test -race -count=1 ./...

  test-panel:
    name: ktalk-panel — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ktalk-panel/go.sum
      - name: go fmt
        run: cd ktalk-panel && gofmt -l . | tee /dev/stderr | (! grep .)
      - name: go vet
        run: cd ktalk-panel && go vet ./...
      - name: go test
        run: cd ktalk-panel && go test -race -count=1 ./...

  build-release:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: [test-core, test-panel]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ktalk-panel/web/pnpm-lock.yaml
      - name: Build frontend
        run: cd ktalk-panel/web && pnpm install --frozen-lockfile && pnpm build
      - name: Build linux/amd64
        run: make build-linux-amd64
      - name: Build linux/arm64
        run: make build-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: ktalk-binaries
          path: dist/
          retention-days: 30
